name: Update Copilot Timeline

on:
  schedule:
    - cron: '0 9 * * 1' # Every Monday at 9:00 UTC
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  update-timeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Scrape changelog
        run: npm run scrape

      - name: Verify data
        run: npm run verify

      - name: Generate timeline data asset
        run: npm run embed

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ assets/timeline-data.js
          git diff --cached --quiet || git commit -m "chore: update Copilot timeline data [skip ci]"
          git push
